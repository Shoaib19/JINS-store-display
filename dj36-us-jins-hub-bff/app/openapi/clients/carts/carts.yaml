    CartResponse:
      type: object
      description: カート・カタログ取得APIレスポンス
      properties:
        cart:
          $ref: '#/components/schemas/cart'
    CartPostRequest:
      type: object
      description: カート新規登録APIリクエスト
      properties:
        cartId:
          type: integer
          format: int64
          description: カートID
          example: 123
          nullable: true
        receptionNumber:
          type: string
          description: 受付番号
          maxLength: 14
          example: 241031US000001
          nullable: false
    CartPatchRequest:
      type: object
      description: カート削除フラグ更新APIリクエスト
      properties:
        deletedFlag:
          type: number
          description: 削除フラグ
          example: 1
          nullable: false
        optimisticLockVerNo:
          type: number
          description: 楽観ロック用バージョン番号
          example: 1
          nullable: true
    LineSetting:
      type: object
      description: 視力測定ライン設定
      properties:
        startTime:
          type: string
          pattern: ^(2[0-3]|[01][0-9]):([0-5][0-9]):([0-5][0-9])$
          description: 開始時間
        availableLines:
          type: integer
          minimum: 0
          description: 視力測定ライン数
      example:
        startTime: '13:00:00'
        availableLines: 3
    CallManagementInfo:
      description: 呼出し管理情報
      type: object
      properties:
        timeRequiredUntilCall:
          type: number
          description: 案内時間
        availableLines:
          type: number
          description: 視力測定ライン数
        lineSettings:
          type: array
          description: 視力測定ライン設定
          maxItems: 4
          nullable: true
          items:
            $ref: '#/components/schemas/LineSetting'
        receptionCloseTime:
          type: string
          description: 受付案内終了時間
          maxLength: 8
        processingCloseTime:
          type: string
          description: 加工終了時間
          maxLength: 8
        inStockLensPickupTime:
          type: string
          maxLength: 8
          description: 常備レンズ後日お渡し時間
        awaitingDeliveryLensPickupTime:
          type: string
          maxLength: 8
          description: 発注レンズ後日お渡し時間
      example:
        timeRequiredUntilCall: 200
        availableLines: 10
        lineSettings:
          - startTime: '11:00:00'
            availableLines: 3
        receptionCloseTime: '08:00:00'
        processingCloseTime: '20:00:00'
        inStockLensPickupTime: '09:00:00'
        awaitingDeliveryLensPickupTime: '11:00:00'
    CallManagementGetResponse:
      type: object
      description: 呼出し管理情報取得APIレスポンス
      properties:
        callManagementInfo:
          $ref: '#/components/schemas/CallManagementInfo'
    CallManagementPutRequest:
      type: object
      description: 呼出し管理情報登録APIリクエスト
      properties:
        timeRequiredUntilCall:
          type: integer
          description: 案内時間
        availableLines:
          type: integer
          description: 視力測定ライン数
        lineSettings:
          type: array
          description: 視力測定ライン設定
          maxItems: 4
          items:
            $ref: '#/components/schemas/LineSetting'
        receptionCloseTime:
          type: string
          pattern: ^(2[0-3]|[01][0-9]):([0-5][0-9]):([0-5][0-9])$
          description: 受付案内終了時間
        processingCloseTime:
          type: string
          pattern: ^(2[0-3]|[01][0-9]):([0-5][0-9]):([0-5][0-9])$
          description: 加工終了時間
        inStockLensPickupTime:
          type: string
          pattern: ^(2[0-3]|[01][0-9]):([0-5][0-9]):([0-5][0-9])$
          description: 常備レンズ後日お渡し時間
        awaitingDeliveryLensPickupTime:
          type: string
          pattern: ^(2[0-3]|[01][0-9]):([0-5][0-9]):([0-5][0-9])$
          description: 発注レンズ後日お渡し時間
      example:
        timeRequiredUntilCall: 10
        availableLines: 2
        lineSettings:
          - startTime: '11:00:00'
            availableLines: 3
        receptionCloseTime: '18:00:00'
        processingCloseTime: '20:00:00'
        inStockLensPickupTime: '09:00:00'
        awaitingDeliveryLensPickupTime: '11:00:00'
      required:
        - timeRequiredUntilCall
        - availableLines
        - receptionCloseTime
        - processingCloseTime
        - inStockLensPickupTime
        - awaitingDeliveryLensPickupTime
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CommonErrorResponse'
          example:
            code: COM_0001
            message: Validation error occurred.
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CommonErrorResponse'
          example:
            code: COM_0002
            message: Specified data not found.
    TooManyRequests:
      description: Too Many Requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CommonErrorResponse'
          example:
            code: COM_0004
            message: Duplicate api invocation detected.
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CommonErrorResponse'
          example:
            code: COM_0000
            message: Unexpected error occurred.
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CommonErrorResponse'
          example:
            code: COM_0003
            message: Transaction failed due to optimisitic lock failure.
  examples:
    COM_0001:
      summary: Validation Error
      description: |
        バリデーションエラー
      value:
        Jins-Trace-ID: b76d2300-cc59-11ea-a9ea-00059a3c7a00
        code: COM_0001
        message: Validation error occurred.
    DPFM_RCPT_0004:
      summary: 受付番号のオーバーフロー
      description: |
        受付番号がオーバーフローしてしまった場合に発生<br>
        250123US999999 の次の番号を採番するなど
      value:
        Jins-Trace-ID: b76d2300-cc59-11ea-a9ea-00059a3c7a00
        code: DPFM_RCPT_0004
        message: reception number overflow.
    DPFM_RCPT_0005:
      summary: 呼出し番号のオーバーフロー
      description: |
        呼出し番号がオーバーフローしてしまった場合に発生<br>
        A999 の次の番号を採番するなど
      value:
        Jins-Trace-ID: b76d2300-cc59-11ea-a9ea-00059a3c7a00
        code: DPFM_RCPT_0005
        message: calling number overflow.
    DPFM_RCPT_0007:
      summary: 来店目的に合致する対応を店舗がしていない
      description: |
        (USで測定を行うなど)店舗で対応していない目的で来店している場合
      value:
        Jins-Trace-ID: b76d2300-cc59-11ea-a9ea-00059a3c7a00
        code: DPFM_RCPT_0007
        message: Purpose of visit cannot be accepted.
    DPFM_RCPT_0010:
      summary: 商品グループコードのオーバーフロー
      description: |
        カートIDが複数取れた場合に発生<br>
      value:
        Jins-Trace-ID: b76d2300-cc59-11ea-a9ea-00059a3c7a00
        code: DPFM_RCPT_0010
        message: ReceptionNumber duplicate in t_cart.
    DPFM_RCPT_0006:
      summary: 処方箋画像形式不正
      description: |
        処方箋画像形式不正
      value:
        Jins-Trace-ID: b76d2300-cc59-11ea-a9ea-00059a3c7a00
        code: DPFM_RCPT_0006
        message: The prescription image is not in the correct format.
    DPFM_RCPT_0008:
      summary: 商品グループの6件目を登録しようとする
      description: |
        論理削除/物理削除されていない 既存商品グループコードが5件であり、6件目を登録しようとする
      value:
        Jins-Trace-ID: b76d2300-cc59-11ea-a9ea-00059a3c7a00
        code: DPFM_RCPT_0008
        message: The product group code can be registered up to a maximum of 5 entries.
    DPFM_RCPT_0009:
      summary: 商品グループコードのオーバーフロー
      description: |
        商品グループコードがオーバーフローしてしまった場合に発生<br>
        250123US456789-99 が登録されている状態で次の商品グループを追加しようとするなど
      value:
        Jins-Trace-ID: b76d2300-cc59-11ea-a9ea-00059a3c7a00
        code: DPFM_RCPT_0009
        message: The maximum number of product groups that can be registered is 99.
