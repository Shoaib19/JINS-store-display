  /cart/call-management/{storeCode}:
    get:
      tags:
        - CallManagement
      summary: 呼出し管理取得API
      description: 店舗IDに紐づく呼出し管理情報を取得する
      operationId: getCallManagement
      parameters:
        - $ref: '#/components/parameters/JinsTraceID'
        - $ref: '#/components/parameters/JinsTraceIdBranchNo'
        - $ref: '#/components/parameters/JinsUserID'
        - name: storeCode
          description: 店舗CD
          in: path
          required: true
          schema:
            type: string
            example: 83005
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallManagementGetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-amazon-apigateway-integration:
        httpMethod: GET
        uri: ${apigateway.uri}/cart/call-management/{storeCode}
        type: ${apigateway.etc}
        requestParameters:
          integration.request.header.jins-trace-id: method.request.header.jins-trace-id
          integration.request.header.jins-trace-id-branch-no: method.request.header.jins-trace-id-branch-no
          integration.request.header.jins-user-id: method.request.header.jins-user-id
          integration.request.path.storeCode: method.request.path.storeCode
    put:
      tags:
        - CallManagement
      summary: 呼出し管理情報登録API
      description: 呼出し管理情報を登録する
      operationId: putCallManagement
      parameters:
        - $ref: '#/components/parameters/JinsTraceID'
        - $ref: '#/components/parameters/JinsTraceIdBranchNo'
        - $ref: '#/components/parameters/JinsUserID'
        - name: storeCode
          description: 店舗コード
          in: path
          required: true
          schema:
            type: string
            example: '83005'
            maxLength: 5
      requestBody:
        required: true
        description: 呼出し管理情報登録APIリクエストボディ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallManagementPutRequest'
      responses:
        '204':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-amazon-apigateway-integration:
        httpMethod: PUT
        uri: ${apigateway.uri}/cart/call-management/{storeCode}
        type: ${apigateway.etc}
        requestParameters:
          integration.request.header.jins-trace-id: method.request.header.jins-trace-id
          integration.request.header.jins-trace-id-branch-no: method.request.header.jins-trace-id-branch-no
          integration.request.header.jins-user-id: method.request.header.jins-user-id
          integration.request.path.storeCode: method.request.path.storeCode
components:
  parameters:
    JinsTraceID:
      in: header
      name: jins-trace-id
      description: アプリケーションノード間のトレーサビリティを確保するためのID
      required: true
      example: 2389c607-f5ed-4789-95a3-efd78be1e8d9
      schema:
        type: string
        nullable: false
    JinsTraceIdBranchNo:
      name: jins-trace-id-branch-no
      description: jins-trace-idに紐付く呼出し枝番
      in: header
      example: 1
      schema:
        type: string
        maxLength: 64
    JinsUserID:
      in: header
      name: jins-user-id
      description: UI側でユーザを識別できるIDを格納
      required: true
      example: U00001
      schema:
        type: string
        maxLength: 256
    OrderBy:
      name: orderBy
      description: |
        順序
        降順の場合は頭にマイナスをつける。
        複数の場合はカンマ区切り。
      in: query
      required: false
      example: rfid_chip_id, -location_id
      schema:
        type: string
    Limit:
      name: limit
      description: 取得制限数
      in: query
      required: false
      example: 1000000
      schema:
        $ref: '#/components/schemas/Limit'
    Offset:
      name: offset
      description: 取得開始位置
      in: query
      required: false
      example: 0
      schema:
        $ref: '#/components/schemas/Offset'
  schemas:
    Limit:
      description: 取得制限数
      type: integer
      minimum: 1
      maximum: 100000
      example: 20
      default: 100000
    Offset:
      description: 取得開始位置
      type: integer
      minimum: 0
      example: 0
      default: 0
    Count:
      description: 今回取得件数
      type: integer
      example: 20
    TotalResults:
      description: 総件数
      type: integer
      example: 10000
    HasMore:
      description: 次回データ存在有無
      type: boolean
      example: true
    ReceptionInfos:
      description: 受付情報
      type: object
      properties:
        registeredDate:
          type: string
          description: 登録日
        visitingPurposeCode:
          type: string
          description: 来店目的コード
        customerIssueCode:
          type: string
          description: 困りごとコード
        prescriptionRegistCode:
          type: string
          description: 度数登録方法コード
        callingNumber:
          type: string
          description: 呼出番号
        receptionNumber:
          type: string
          description: 受付番号
        statusCode:
          type: string
          description: ステータスコード
        callingStatusCode:
          type: string
          description: 呼出状態コード
        countryCodeAlpha2:
          type: string
          description: 国コード(alpha-2)
        storeId:
          type: integer
          description: 店舗ID
        customerName:
          type: string
          description: 注文者名
        phoneNumber:
          type: string
          description: 電話番号
        jinsAccountId:
          type: string
          description: JINSアカウントID
        registeredUserId:
          type: string
          description: 登録者ID
        registeredProgram:
          type: string
          description: 登録プログラム
        registeredDatetime:
          type: string
          description: 登録日時
        updatedUserId:
          type: string
          description: 更新者ID
        updatedProgram:
          type: string
          description: 更新プログラム
        updatedDatetime:
          type: string
          description: 更新日時
    ReceptionGetResponse:
      type: object
      description: 待ち状況取得APIレスポンス
      properties:
        receptionInfos:
          type: array
          items:
            $ref: '#/components/schemas/ReceptionInfos'
      example:
        receptionInfos:
          - registeredDate: '2025-01-14'
            visitingPurposeCode: '010'
            customerIssueCode: '001'
            prescriptionRegistCode: '001'
            callingNumber: A1
            receptionNumber: 250114US000001
            statusCode: '100'
            callingStatusCode: '001'
            countryCodeAlpha2: US
            storeId: '1143416'
            customerName: John Doe
            phoneNumber: '07012345678'
            jinsAccountId: null
            registeredUserId: JINS0001
            registeredProgram: Step2_test
            registeredDatetime: '2025-03-28T05:01:00'
            updatedUserId: JINS0001
            updatedProgram: Step2_test
            updatedDatetime: '2025-03-28T05:01:00'
          - registeredDate: '2025-01-14'
            visitingPurposeCode: '010'
            customerIssueCode: '001'
