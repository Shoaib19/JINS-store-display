openapi: 3.0.3
info:
  title: ${info.title}
  description: |-
    ### カート/受付サービスAPI (L2-1)
    ### 共通仕様
    #### リクエストヘッダー
    TBD
    #### レスポンスヘッダー
    TBD
    #### エラーレスポンス
    TBD
    ##### エラーコード
    * 400: Bad Request
    * 401: Unauthorized
    * 403: Forbidden
    * 404: Not Found
    * 405: Method Not Allowed
    * 406: Not Acceptable
    * 429: Too Many Requests
    * 500: Internal Server Error
    * 501: Not Implemented
    * 503: Service Unavailable
    * 504: Gateway Timeout
  version: ${api.version}
paths:
  /cart/receptions/{storeCode}:
    get:
      tags:
        - Receptions
      summary: 待ち状況取得API
      description: 店舗CDをもとに本日である呼出待ち, 呼出中, 不在, 外出となっている受付情報を取得する。
      operationId: findReceptions
      parameters:
        - $ref: '#/components/parameters/JinsTraceID'
        - $ref: '#/components/parameters/JinsTraceIdBranchNo'
        - $ref: '#/components/parameters/JinsUserID'
        - name: storeCode
          description: 店舗CD
          in: path
          required: true
          schema:
            type: string
            example: 830005
        - name: receptionNumber
          description: 受付番号
          in: query
          schema:
            type: string
            example: 250114US000001
        - name: registeredDate
          description: 登録日
          in: query
          required: true
          schema:
            type: string
            format: date
            example: '2025-05-13'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceptionGetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-amazon-apigateway-integration:
        httpMethod: GET
        uri: ${apigateway.uri}/cart/receptions/{storeCode}
        type: ${apigateway.etc}
        requestParameters:
          integration.request.header.jins-trace-id: method.request.header.jins-trace-id
          integration.request.header.jins-trace-id-branch-no: method.request.header.jins-trace-id-branch-no
          integration.request.header.jins-user-id: method.request.header.jins-user-id
          integration.request.path.storeCode: method.request.path.storeCode
  /cart/receptions:
    post:
      tags:
        - Receptions
      summary: 受付情報新規作成API
      operationId: postReception
      parameters:
        - $ref: '#/components/parameters/JinsTraceID'
        - $ref: '#/components/parameters/JinsTraceIdBranchNo'
        - $ref: '#/components/parameters/JinsUserID'
      requestBody:
        required: true
        description: 受付情報新規作成APIのリクエストボディ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceptionPostRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceptionPostResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonErrorResponse'
              examples:
                COM_0001:
                  $ref: '#/components/examples/COM_0001'
                DPFM_RCPT_0004:
                  $ref: '#/components/examples/DPFM_RCPT_0004'
                DPFM_RCPT_0005:
                  $ref: '#/components/examples/DPFM_RCPT_0005'
                DPFM_RCPT_0007:
                  $ref: '#/components/examples/DPFM_RCPT_0007'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-amazon-apigateway-integration:
        httpMethod: POST
        uri: ${apigateway.uri}/cart/receptions
        type: ${apigateway.etc}
        requestParameters:
          integration.request.header.jins-trace-id: method.request.header.jins-trace-id
          integration.request.header.jins-trace-id-branch-no: method.request.header.jins-trace-id-branch-no
          integration.request.header.jins-user-id: method.request.header.jins-user-id
    get:
      tags:
        - Receptions
      summary: 受付情報検索API
      operationId: searchReceptionInformation
      parameters:
      - $ref: '#/components/parameters/JinsTraceID'
      - $ref: '#/components/parameters/JinsTraceIdBranchNo'
      - $ref: '#/components/parameters/JinsUserID'
      - $ref: '#/components/parameters/Offset'
      - $ref: '#/components/parameters/Limit'
      - name: storeCode
        description: 店舗CD
        in: query
        required: false
        schema:
          type: string
          example: "830005"
      - name: receptionNumber
        description: 受付番号
        in: query
        required: false
        schema:
          type: string
          example: "241230US00001"
      - name: registeredDate
        description: 登録日
        in: query
        schema:
          type: string
          format: date
          example: "2025-05-13"
      - name: sortKey
        description: 
          ソートキー<br>
          昇順降順はコロン区切り<br>
          複数の場合はカンマ区切り<br>
          スペースは挟まない
        in: query
        required: false
        schema:
          type: string
          example: "registeredDate:ASC"
      - name: keyword
        description: 検索キーワード（顧客名、電話番号、受付番号のどちらか）
        in: query
        required: false
        schema:
          type: string
          example: "241230US00001"
      - name: registeredDateTimeFrom
        description: 受付日時From
        in: query
        schema:
          type: string
          format: date-time
          example: "2025-05-13T09:00:00"
      - name: registeredDateTimeTo
        description: 受付日時To
        in: query
        schema:
          type: string
          format: date-time
          example: "2025-05-14T09:00:00"
      - name: receptionStatusCode
        description: 
          受付ステータスコード<br>
          複数指定の場合はカンマ区切りで指定
        in: query
        required: false
        schema:
          type: string
          example: "100,101"
      - name: countryCodeAlpha2
        description: 国コード(alpha-2)
        in: query
        required: false
        schema:
          type: string
          example: "US"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessesGetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-amazon-apigateway-integration:
        httpMethod: GET
        uri: ${apigateway.uri}/cart/receptions
        type: ${apigateway.etc}
        requestParameters:
          integration.request.header.jins-trace-id: method.request.header.jins-trace-id
          integration.request.header.jins-trace-id-branch-no: method.request.header.jins-trace-id-branch-no
          integration.request.header.jins-user-id: method.request.header.jins-user-id
  /cart/receptions-events/{receptionNumber}:
    get:
      tags:
        - ReceptionEvents
      summary: 受付履歴取得API
      operationId: findReceptionEvents
      parameters:
        - $ref: '#/components/parameters/JinsTraceID'
        - $ref: '#/components/parameters/JinsTraceIdBranchNo'
        - $ref: '#/components/parameters/JinsUserID'
        - $ref: '#/components/parameters/OrderBy'
        - name: receptionNumber
          description: 受付番号
          in: path
          schema:
            type: string
            maximum: 14
            example: 241015US000001
          required: true
        - name: itemGroupCode
          description: 商品グループCD
          in: query
          schema:
            type: string
            maxLength: 17
            example: 241015US000001-1
          required: false
        - name: lastedFlag
          description: 最新情報取得フラグ
          in: query
          schema:
            type: boolean
            example: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceptionEventsGetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-amazon-apigateway-integration:
        httpMethod: GET
        uri: ${apigateway.uri}/cart/receptions-events/{receptionNumber}
        type: ${apigateway.etc}
        requestParameters:
          integration.request.header.jins-trace-id: method.request.header.jins-trace-id
          integration.request.header.jins-trace-id-branch-no: method.request.header.jins-trace-id-branch-no
          integration.request.header.jins-user-id: method.request.header.jins-user-id
          integration.request.path.receptionNumber: method.request.path.receptionNumber
  /cart/receptions-events:
    post:
      tags:
        - ReceptionEvents
      summary: 受付情報更新API
      operationId: postReceptionEvents
      parameters:
        - $ref: '#/components/parameters/JinsTraceID'
        - $ref: '#/components/parameters/JinsTraceIdBranchNo'
        - $ref: '#/components/parameters/JinsUserID'
      requestBody:
        required: true
        description: 受付情報更新APIのリクエストボディ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceptionEventsRequest'
      responses:
        '204':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-amazon-apigateway-integration:
        httpMethod: POST
        uri: ${apigateway.uri}/cart/receptions-events
        type: ${apigateway.etc}
        requestParameters:
          integration.request.header.jins-trace-id: method.request.header.jins-trace-id
          integration.request.header.jins-trace-id-branch-no: method.request.header.jins-trace-id-branch-no
          integration.request.header.jins-user-id: method.request.header.jins-user-id
  /cart/prescriptions/{itemGroupCode}:
    get:
      tags:
        - Prescriptions
      summary: 処方箋画像取得API
      description: 登録済みの処方箋画像を取得する
      operationId: getPrescription
      parameters:
        - $ref: '#/components/parameters/JinsTraceID'
        - $ref: '#/components/parameters/JinsTraceIdBranchNo'
        - $ref: '#/components/parameters/JinsUserID'
        - name: itemGroupCode
          description: 商品グループCD
          in: path
          required: true
          schema:
            type: string
            maxLength: 17
            example: prct001
        - name: countryCodeAlpha2
          description: 事業国コード
          in: query
          schema:
            type: string
            maxLength: 2
            example: US
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrescriptionsGetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-amazon-apigateway-integration:
        httpMethod: GET
        uri: ${apigateway.uri}/cart/prescriptions/{itemGroupCode}
        type: ${apigateway.etc}
        requestParameters:
          integration.request.header.jins-trace-id: method.request.header.jins-trace-id
          integration.request.header.jins-trace-id-branch-no: method.request.header.jins-trace-id-branch-no
          integration.request.header.jins-user-id: method.request.header.jins-user-id
          integration.request.path.itemGroupCode: method.request.path.itemGroupCode
  /cart/prescriptions/copy/{originalItemGroupCode}/{copiedItemGroupCode}:
    post:
      tags:
        - Prescriptions
      summary: 処方箋画像コピーAPI
      description: 登録済みの処方箋画像をコピーする
      operationId: copyPrescription
      parameters:
        - $ref: '#/components/parameters/JinsTraceID'
        - $ref: '#/components/parameters/JinsTraceIdBranchNo'
        - $ref: '#/components/parameters/JinsUserID'
        - name: originalItemGroupCode
          description: コピー元商品グループCD
          in: path
          required: true
          schema:
            type: string
            maxLength: 17
            example: prct001
        - name: copiedItemGroupCode
          description: コピー先商品グループCD
          in: path
          required: true
          schema:
            type: string
            maxLength: 17
            example: prct001
        - name: countryCodeAlpha2
          description: 事業国コード
          in: query
          schema:
            type: string
            maxLength: 2
            example: US
      responses:
        '204':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-amazon-apigateway-integration:
        httpMethod: POST
        uri: ${apigateway.uri}/cart/prescriptions/copy/{originalItemGroupCode}/{copiedItemGroupCode}
        type: ${apigateway.etc}
        requestParameters:
          integration.request.header.jins-trace-id: method.request.header.jins-trace-id
          integration.request.header.jins-trace-id-branch-no: method.request.header.jins-trace-id-branch-no
          integration.request.header.jins-user-id: method.request.header.jins-user-id
          integration.request.path.originalItemGroupCode: method.request.path.originalItemGroupCode
          integration.request.path.copiedItemGroupCode: method.request.path.copiedItemGroupCode
  /cart/item-groups/{receptionNumber}/{itemGroupCode}:
    put:
      tags:
        - ItemGroups
      summary: 受取方法登録API
      operationId: putItemGroups
      parameters:
        - $ref: '#/components/parameters/JinsTraceID'
        - $ref: '#/components/parameters/JinsTraceIdBranchNo'
        - $ref: '#/components/parameters/JinsUserID'
        - name: receptionNumber
          description: 受付番号
          in: path
          required: true
          schema:
            type: string
            example: 241031US000001
            maxLength: 14
        - name: itemGroupCode
          description: 商品グループコード
          in: path
          required: true
          schema:
            type: string
            example: 241031US000001-1
            maxLength: 17
      requestBody:
        required: true
        description: 受取方法登録APIのリクエストボディ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemGroupPutRequest'
      responses:
        '204':
          description: OK
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonErrorResponse'
              examples:
                COM_0001:
                  $ref: '#/components/examples/COM_0001'
                DPFM_RCPT_0010:
                  $ref: '#/components/examples/DPFM_RCPT_0010'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-amazon-apigateway-integration:
        httpMethod: PUT
        uri: ${apigateway.uri}/cart/item-groups/{receptionNumber}/{itemGroupCode}
        type: ${apigateway.etc}
        requestParameters:
          integration.request.header.jins-trace-id: method.request.header.jins-trace-id
          integration.request.header.jins-user-id: method.request.header.jins-user-id
          integration.request.header.jins-trace-id-branch-no: method.request.header.jins-trace-id-branch-no
          integration.request.path.receptionNumber: method.request.path.receptionNumber
          integration.request.path.itemGroupCode: method.request.path.itemGroupCode
  /cart/item-groups/items/{itemGroupCode}:
    delete:
      tags:
        - ItemGroups
      summary: 商品グループ削除API
      operationId: deleteItemGroups
      parameters:
        - $ref: '#/components/parameters/JinsTraceID'
        - $ref: '#/components/parameters/JinsTraceIdBranchNo'
        - $ref: '#/components/parameters/JinsUserID'
        - name: itemGroupCode
          description: 商品グループコード
          in: path
          required: true
          schema:
            type: string
            example: 240123US000001-1
            maxLength: 17
        - name: countryCodeAlpha2
          description: 事業国コード
          in: query
          schema:
            type: string
            example: US
            maxLength: 2
      responses:
        '204':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-amazon-apigateway-integration:
        httpMethod: DELETE
        uri: ${apigateway.uri}/cart/item-groups/items/{itemGroupCode}
        type: ${apigateway.etc}
        requestParameters:
          integration.request.header.jins-trace-id: method.request.header.jins-trace-id
          integration.request.header.jins-user-id: method.request.header.jins-user-id
          integration.request.header.jins-trace-id-branch-no: method.request.header.jins-trace-id-branch-no
          integration.request.path.itemGroupCode: method.request.path.itemGroupCode
  /cart/lineitems:
    post:
      tags:
        - Lineitems
      summary: カート情報登録API
      operationId: postLineitem
      parameters:
        - $ref: '#/components/parameters/JinsTraceID'
        - $ref: '#/components/parameters/JinsTraceIdBranchNo'
        - $ref: '#/components/parameters/JinsUserID'
      requestBody:
        required: true
        description: カート情報登録APIのリクエストボディ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LineitemPostRequest'
      responses:
        '204':
          description: OK
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonErrorResponse'
              examples:
                COM_0001:
                  $ref: '#/components/examples/COM_0001'
                DPFM_RCPT_0006:
                  $ref: '#/components/examples/DPFM_RCPT_0006'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-amazon-apigateway-integration:
        httpMethod: POST
        uri: ${apigateway.uri}/cart/lineitems
        type: ${apigateway.etc}
        requestParameters:
          integration.request.header.jins-trace-id: method.request.header.jins-trace-id
          integration.request.header.jins-trace-id-branch-no: method.request.header.jins-trace-id-branch-no
          integration.request.header.jins-user-id: method.request.header.jins-user-id
  /cart/carts:
    get:
      tags:
        - Carts
      summary: カート・カタログ取得API
      description: カートIDに紐づくカート・商品グループ・カート明細の情報を取得する
      operationId: findCart
      parameters:
        - $ref: '#/components/parameters/JinsTraceID'
        - $ref: '#/components/parameters/JinsTraceIdBranchNo'
        - $ref: '#/components/parameters/JinsUserID'
        - name: cartId
          description: カートID
          in: query
          required: false
          schema:
            type: integer
            format: int64
            example: 123
        - name: receptionNumber
          description: 受付番号
          in: query
          required: false
          schema:
            type: string
            maxLength: 14
            example: UH340930000001
        - name: deleteFlag
          description: 削除レコード取得フラグ
          in: query
          required: false
          schema:
            type: boolean
            example: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonErrorResponse'
              examples:
                COM_0001:
                  $ref: '#/components/examples/COM_0001'
                DPFM_RCPT_0010:
                  $ref: '#/components/examples/DPFM_RCPT_0010'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-amazon-apigateway-integration:
        httpMethod: GET
        uri: ${apigateway.uri}/cart/carts
        type: ${apigateway.etc}
        requestParameters:
          integration.request.header.jins-trace-id: method.request.header.jins-trace-id
          integration.request.header.jins-trace-id-branch-no: method.request.header.jins-trace-id-branch-no
          integration.request.header.jins-user-id: method.request.header.jins-user-id
    post:
      tags:
        - Carts
      summary: カート新規作成API
      operationId: postCart
      parameters:
        - $ref: '#/components/parameters/JinsTraceID'
        - $ref: '#/components/parameters/JinsTraceIdBranchNo'
        - $ref: '#/components/parameters/JinsUserID'
      requestBody:
        required: true
        description: カート新規作成APIのリクエストボディ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartPostRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonErrorResponse'
              examples:
                COM_0001:
                  $ref: '#/components/examples/COM_0001'
                DPFM_RCPT_0008:
                  $ref: '#/components/examples/DPFM_RCPT_0008'
                DPFM_RCPT_0009:
                  $ref: '#/components/examples/DPFM_RCPT_0009'
                DPFM_RCPT_0010:
                  $ref: '#/components/examples/DPFM_RCPT_0010'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-amazon-apigateway-integration:
        httpMethod: POST
        uri: ${apigateway.uri}/cart/carts
        type: ${apigateway.etc}
        requestParameters:
          integration.request.header.jins-trace-id: method.request.header.jins-trace-id
          integration.request.header.jins-trace-id-branch-no: method.request.header.jins-trace-id-branch-no
          integration.request.header.jins-user-id: method.request.header.jins-user-id
  /cart/carts/{cartId}:
    patch:
      tags:
        - Carts
      summary: カート削除フラグ更新API
      operationId: patchCart
      parameters:
        - $ref: '#/components/parameters/JinsTraceID'
        - $ref: '#/components/parameters/JinsTraceIdBranchNo'
        - $ref: '#/components/parameters/JinsUserID'
        - name: cartId
          description: カートID
          in: path
          required: true
          schema:
            type: integer
            format: int64
            example: 123
      requestBody:
        required: true
        description: カート削除フラグ更新APIのリクエストボディ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartPatchRequest'
      responses:
        '204':
          description: OK
        '400':
