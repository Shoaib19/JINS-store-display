                  description: DPFM_OMS_0701
                  value:
                    code: DPFM_OMS_0701
                    message: deliveryStatus of the specified data is not READY_FOR_DELIVERY or DELIVERED.
                DPFM_OMS_0702:
                  description: DPFM_OMS_0702
