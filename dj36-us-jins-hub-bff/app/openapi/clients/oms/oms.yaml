                type: string
          description: コンテンツタイプ。application/json を指定してください。
          in: header
          name: Content-Type
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculateAmountWriteDto'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculateAmountReadDto'
          description: 成功
        '400':
          content:
            application/json:
              examples:
                COM_0001:
                  description: COM_0001
                  value:
                    code: COM_0001
                    message: Validation error occurred.
                DPFM_OMS_0101:
                  description: DPFM_OMS_0101
                  value:
                    code: DPFM_OMS_0101
                    message: Specified item's selling prices not found.
                DPFM_OMS_0102:
                  description: DPFM_OMS_0102
                  value:
                    code: DPFM_OMS_0102
                    message: GlassLines and feeLines and discountLines are null or empty. Specify at least one.
                DPFM_OMS_0103:
                  description: DPFM_OMS_0103
                  value:
                    code: DPFM_OMS_0103
                    message: Specify itemId at least one in glassLine.
                DPFM_OMS_0104:
                  description: DPFM_OMS_0104
                  value:
                    code: DPFM_OMS_0104
                    message: Item info not found.
                DPFM_OMS_0105:
                  description: DPFM_OMS_0105
                  value:
