        |005|JINSアプリ|JINS app|
        |006|手動入力|Manual enter|
        <br>
      maxLength: 3
      nullable: true
    replacePartCode:
      type: string
      description: |
        交換部位
        |コード|名称(英語)|
        |:---|:---|
        |001|ALL|
        |011|Frame|
        |021|Lenses|
        <br>
      maxLength: 3
    replaceReasonCode:
      type: string
      description: |
        交換理由
        |コード|名称(英語)|
        |:---|:---|
        |001|Initial failure|
        |002|Customer's convenience|
        <br>
      maxLength: 3
    replaceTypeCode:
      type: string
      description: |
        交換種別
        |コード|名称(英語)|
        |:---|:---|
        |001|Warranty|
        |002|Return policy|
