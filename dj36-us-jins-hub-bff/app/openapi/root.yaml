  /api/sales/orders-search/{storeCode}:
    get:
      tags:
        - Order
      summary: オーダー情報検索API
      description: カートの情報をオーダーとして複製する・在庫を割り当てる
      operationId: getOrderSearch
      parameters:
        - $ref: "#/components/parameters/JinsTraceID"
        - $ref: "#/components/parameters/X-Cursor"
        - $ref: "#/components/parameters/JinsStoreTimezone"
        - name: storeCode
          description: 店舗コード
          in: path
          required: true
          schema:
            type: string
            example: "83005"
            maxLength: 5
        - name: keyword
          description: 検索キーワード
          in: query
          schema:
            type: string
            example: "241230US000001"
        - name: orderStatusCode
          description: 注文ステータスコード
          in: query
          schema:
            type: string
            example: "001,002"
        - name: fromReceptionDate
          description: 受付日（検索始め）※toReceptionDateがある場合のみ必須
          in: query
          schema:
            type: string
            format: date-time
            example: "2024-12-30T08:00:00Z"
        - name: toReceptionDate
          description: 受付日（検索終わり）※fromReceptionDateがある場合のみ必須
          in: query
          schema:
            type: string
            format: date-time
            example: "2025-01-01T07:59:59Z"
        - name: fromPurchaseDate
          description: 購入日（検索始め）※toPurchaseDateがある場合のみ必須
          in: query
          schema:
            type: string
            format: date
            example: "2024-12-30"
        - name: toPurchaseDate
          description: 購入日（検索終わり）※fromPurchaseDateがある場合のみ必須
          in: query
          schema:
            type: string
            format: date
            example: "2025-01-01"
        - name: countryCodeAlpha2
          description: 国コード
          in: query
          schema:
            type: string
            example: "US"
        - name: sortKey
          description: |
            ソートキー
            昇順降順はコロン区切り
            複数の場合はカンマ区切り
            スペースは挟まない
          in: query
          required: true
          schema:
            type: string
            example: fromReceptionDate:ASC
        - name: jinsAccountId
          description: 会員ID
          in: query
          schema:
            type: string
            example: "123456789"
        - name: isSearchingByJinsAccountId
          description: 会員IDによる検索フラグ
          in: query
          required: true
          schema:
            type: boolean
            example: false
      responses:
        200:
          description: OK
          headers:
            X-Cursor:
              $ref: "#/components/parameters/X-Cursor"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderSearchResponse"
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              examples:
                COM_0001:
                  $ref: "#/components/examples/COM_0001"
                COM_0002:
                  $ref: "#/components/examples/COM_0002"
                BFF_USSTORESTAFF_0025:
                  $ref: "#/components/examples/BFF_USSTORESTAFF_0025"
                BFF_USSTORESTAFF_0026:
                  $ref: "#/components/examples/BFF_USSTORESTAFF_0026"
                DPFM_RCPT_0010:
                  $ref: "#/components/examples/DPFM_RCPT_0010"
        429:
          $ref: "#/components/responses/TooManyRequests"
        500:
          $ref: "#/components/responses/InternalServerError"

