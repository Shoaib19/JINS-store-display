        |900|受付キャンセル|reception cancel|
        |901|オーダーキャンセル|order cancel|
        <br>
        \* 眼鏡購入時以外の完了(調整/アクセサリー購入/ヘルプ・相談)
      maxLength: 3
    registrationMethodCode:
      type: string
