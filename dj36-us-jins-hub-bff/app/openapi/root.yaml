          type: number
          nullable: true
          description: 矯正両目視力、小数点以下2桁まで、プラス・マイナス表記なし。
        perspectiveTypeCode:
          $ref: "#/components/schemas/perspectiveTypeCode"
        eyepointRight:
          type: number
          nullable: true
          description: アイポイント(R)、小数点以下1桁まで、プラス・マイナス表記あり。
        eyepointLeft:
          type: number
          nullable: true
          description: アイポイント(L)、小数点以下1桁まで、プラス・マイナス表記あり。
        pdRight:
          type: number
          nullable: true
          description: PD(R)、小数点以下2桁まで。プラス・マイナス表記なし。
        pdLeft:
          type: number
          nullable: true
          description: PD(L)、小数点以下2桁まで。プラス・マイナス表記なし。
        sphRight:
          type: number
          nullable: true
          description: SPH(R)、小数点以下2桁まで。プラス・マイナス表記あり。
        sphLeft:
          type: number
          nullable: true
          description: SPH(L)、小数点以下2桁まで。プラス・マイナス表記あり。
        cylRight:
          type: number
          nullable: true
          description: CYL(R)、小数点以下2桁まで。プラス・マイナス表記あり。
        cylLeft:
          type: number
          nullable: true
          description: CYL(L)、小数点以下2桁まで。プラス・マイナス表記あり。
        axisRight:
          type: integer
          nullable: true
          description: AXS(R)、小数点なし。プラス・マイナス表記なし。
        axisLeft:
          type: integer
          nullable: true
          description: AXS(L)、小数点なし。プラス・マイナス表記なし。
        addRight:
          type: number
          nullable: true
          description: 加入度数(R)、累進レンズで必須、小数点以下2桁まで。プラス・マイナス表記なし。
        addLeft:
          type: number
          nullable: true
          description: 加入度数(L)、累進レンズで必須、小数点以下2桁まで。プラス・マイナス表記なし。
        prismFlag:
          type: boolean
          nullable: true
          description: プリズムレンズかどうかを判定するフラグ
        prism01Right:
          type: number
          nullable: true
          description: プリズム01_R、プリズムレンズで必須、小数点以下2桁まで。プラス・マイナス表記なし。
        prism01Left:
          type: number
          nullable: true
          description: プリズム01_L、プリズムレンズで必須、小数点以下2桁まで。プラス・マイナス表記なし。
        baseHRight:
          type: string
          nullable: true
          description: ベースH_R、プリズムレンズで必須(BI/BO)
          maxLength: 2
        baseHLeft:
          type: string
          nullable: true
          description: ベースH_L、プリズムレンズで必須(BI/BO)
          maxLength: 2
        prism02Right:
          type: number
          nullable: true
          description: プリズム02_R、プリズムレンズで必須、小数点以下2桁まで。プラス・マイナス表記なし。
        prism02Left:
          type: number
          nullable: true
          description: プリズム02_L、プリズムレンズで必須、小数点以下2桁まで。プラス・マイナス表記なし。
        baseVRight:
          type: string
          nullable: true
          description: ベースV_R、プリズムレンズで必須(BU/BD)
          maxLength: 2
        baseVLeft:
          type: string
          nullable: true
          description: ベースV_L、プリズムレンズで必須(BU/BD)
          maxLength: 2
