    LineSetting:
      type: object
      description: 視力測定ライン設定
      properties:
        startTime:
          type: string
          pattern: ^(2[0-3]|[01][0-9]):([0-5][0-9]):([0-5][0-9])$
          description: 開始時間
        availableLines:
          type: integer
          minimum: 0
          description: 視力測定ライン数
      example:
        startTime: '13:00:00'
        availableLines: 3
  responses:

    CallingStatusOK:
      description: OK
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CallingStatusResponse"
          example:
            callingStatusCode: "004"

    OrdersStatusOK:
      description: OK
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OrderStatusResponse"
          example:
            orderStatusCode: "004"

    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApplicationError"
          example:
            Jins-Trace-ID: "2389c607-f5ed-4789-95a3-efd78be1e8d9"
            timestamp: "2024-12-30T12:34:56Z"
            systemName: "BFF"
            code: "COM_0001"
            message: "Validation error occurred."
            details: "The XXXX is required."
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApplicationError"
          example:
            Jins-Trace-ID: "2389c607-f5ed-4789-95a3-efd78be1e8d9"
            # timestamp: "2024-12-30T12:34:56Z"
            # systemName: "BFF"
            code: "COM_0007"
            message: "Authentication failed."
            details: "Staff ID or password is incorrect."
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApplicationError"
          example:
            Jins-Trace-ID: "2389c607-f5ed-4789-95a3-efd78be1e8d9"
            # timestamp: "2024-12-30T12:34:56Z"
            # systemName: "BFF"
            code: "COM_0003"
            message: "Forbidden."
            details: "You do not have permission to access this resource."
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApplicationError"
          example:
            Jins-Trace-ID: "2389c607-f5ed-4789-95a3-efd78be1e8d9"
            timestamp: "2024-12-30T12:34:56Z"
            systemName: "BFF"
            code: "COM_0002"
            message: "Specified data not found."
            details: "There is no recode matched XXXX."
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApplicationError"
          example:
            Jins-Trace-ID: "2389c607-f5ed-4789-95a3-efd78be1e8d9"
            # timestamp: "2024-12-30T12:34:56Z"
            # systemName: "BFF"
            code: "COM_0005"
            message: "Transaction failed due to optimistic lock failure."
            details: "The request could not be completed due to a conflict with the current state of the resource."
    TooManyRequests:
      description: Too Many Requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApplicationError"
          example:
            Jins-Trace-ID: "2389c607-f5ed-4789-95a3-efd78be1e8d9"
            # timestamp: "2024-12-30T12:34:56Z"
            # systemName: "BFF"
            code: "COM_0006"
            message: "Too Many Requests."
            details: "Duplicate api invocation detected."
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApplicationError"
          example:
            Jins-Trace-ID: "2389c607-f5ed-4789-95a3-efd78be1e8d9"
            timestamp: "2024-12-30T12:34:56Z"
            systemName: "BFF"
            code: "COM_0000"
            message: "Internal Server Error."
            details: "Unexpected error occurred."
