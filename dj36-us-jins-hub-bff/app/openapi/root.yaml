            deliveryMethodCodeが004(他店受取)/005(他店ピックアップロッカー)の時は必須
          maxLength: 5
        deliveryAddress:
          description: |-
            配送先情報
            deliveryMethodCodeが001(配送)の時は必須
          properties:
            fullName:
              type: string
              description: 顧客名
              maxLength: 40
            address1:
              type: string
              description: 住所1
              maxLength: 40
            address2:
              type: string
              description: 住所2
              maxLength: 40
            city:
              type: string
              description: 市
              maxLength: 40
            postalCode:
              type: string
              description: 郵便番号
              maxLength: 10
            state:
              type: string
              description: 州
              maxLength: 40
            phoneNumber:
              type: string
              description: 電話番号
              maxLength: 12
          required:
            - fullName
            - address1
            - city
            - postalCode
            - state
            - phoneNumber
        deliveryDate:
          type: string
          description: 受取日
          maxLength: 24
        isWaitingLens:
          type: boolean
          description: レンズ納品待ち
        isDeliveryToday:
          type: boolean
          description: 当日受渡フラグ
      required:
        - deliveryMethodCode
        - isWaitingLens
        - isDeliveryToday
      example:
        deliveryMethodCode: "002"
        deliveryStoreCode: "83005"
        deliveryAddress:
          fullName: "Test Jins"
          address1: "123 Main Street"
          address2: "Apartment 101, Suite B"
          city: "Los Angeles"
          postalCode: "90001"
          state: "CA"
          phoneNumber: "1234567890"
        deliveryDate: "2024-12-30T08:00:00Z"
        isWaitingLens: true
        isDeliveryToday: true
    StaffLoginResponse:
      description: スタッフログインAPIレスポンス
      properties:
        token:
          type: string
          description: 認証トークン
      example:
        token: "abcdefgh12345678"
    WarrantyGetResponse:
      description: 保証書状態確認APIレスポンス
      properties:
        replacementType:
          $ref: "#/components/schemas/replacementType"
        replacementPart:
          $ref: "#/components/schemas/replacementPart"
        replacementReason:
          $ref: "#/components/schemas/replacementReason"
        exchangeCountIncrementFlag:
          type: boolean
          description: 交換回数カウント可否
          nullable: true
        alertCode:
          type: string
          description: アラートコード
          nullable: true
        alertMessage:
          type: string
          description: アラート文言
          nullable: true
      example:
        replacementType: "001"
        replacementPart: "000"
        replacementReason: "002"
        exchangeCountIncrementFlag: TRUE
    WarrantyPostRequest:
      description: 保証情報登録・変更APIリクエスト
      properties:
        warrantyNumber:
          description: 保証書番号
          type: string
          maxLength: 17
        receptionNumber:
          description: 受付番号
          type: string
          maxLength: 14
        replacementType:
          $ref: "#/components/schemas/replacementType"
        replacementPart:
          $ref: "#/components/schemas/replacementPart"
        replacementReason:
          $ref: "#/components/schemas/replacementReason"
        exchangeCountIncrementFlag:
          type: boolean
          description: 交換回数カウント可否
      required:
        - warrantyNumber
        - receptionNumber
        - replacementType
        - replacementPart
        - replacementReason
        - exchangeCountIncrementFlag
      example:
        warrantyNumber: "240123US000001-1"
        receptionNumber: "250312US000001"
        replacementType: "001"
        replacementPart: "000"
        replacementReason: "002"
        exchangeCountIncrementFlag: TRUE

    warrantyExchange:
      description: 保証交換
      properties:
        warrantyNumber:
          type: string
          maxLength: 17
          description: 保証書番号
        replacementPart:
          $ref: "#/components/schemas/replacementPart"

    callingNumber:
      type: string
      description: |
        呼出し番号
        - <列タイプ><連番>

        |列タイプ|名称(日本語)|名称(英語)|
        |:---|:---|:---|
        |A|メイン測定方法|measurement|
        |B|メイン以外の測定方法||
        |F|調整|repair|
        |G|ヘルプ・相談||
        |P|パッケージ購入||
        <br>
      maxLength: 4
    callingStatusCode:
      type: string
      description: |
        呼び出し状態コード
        |コード|名称(日本語)|名称(英語)|
        |:---|:---|:---|
        |000|対象外|none|
        |001|呼出待|waiting|
        |002|呼出中|calling|
        |003|呼出済|in service|
        |010|完了|done|
        |020|取消|cancel|
        |090|不在|no show|
        |091|外出|going out|
        <br>
      maxLength: 3
    customerIssueCode:
      type: string
      description: |
        困りごとコード
        |コード|名称(英語)|
        |:---|:---|
        |001|The size does not fit me.|
        |002|The nose pad or screw is removed.|
        |003|The frame is bent.|
        |004|I want to change lenses.|
        |005|I can't see clearly.|
        |006|Strong prescription.|
        |999|Other.|
        <br>
      maxLength: 3
      nullable: true
    deliveryMethodCode:
      type: string
      description: |
        受け渡し方法コード
        |コード|名称(日本語)|名称(英語)|
        |:---|:---|:---|
        |001|配送|Shipping|
        |002|店舗受取|Hand over|
        |003|ピックアップロッカー|Pickup locker|
        |004|他店受取|Hand over at other store|
        |005|他店ピックアップロッカー|Pickup locker at other store|
        <br>
      maxLength: 3
    eventCode:
      type: string
      description: |
        処理コード
        |eventCode|名称(英語)|名称(日本語)|subEventCode|名称(英語)|名称(日本語)|
        |:---|:---|:---|:---|:---|:---|
        |000|Check-in|受付|-|-|-|
        |100|Registered|度数登録|000|calling|呼出|
        ||||010|check-in|受付|
        ||||020|cancel|取消|
        ||||030|absence|不在|
        ||||100|add|登録|
        ||||110|change|更新|
        ||||120|delete|削除|
        |150|Measurement|測定|000|calling|呼出|
        ||||010|check-in|受付|
        ||||020|cancel|取消|
        ||||030|absence|不在|
        ||||100|add|登録|
        ||||110|change|更新|
        ||||120|delete|削除|
        |200|Frame|フレーム|100|add|登録|
        ||||110|change|更新|
        ||||120|delete|削除|
        |300|Lenses|レンズ|100|add|登録|
        ||||110|change|更新|
        ||||120|delete|削除|
        |400|Case|ケース|100|add|登録|
        ||||110|change|更新|
        ||||120|delete|削除|
        |410|Cerrito|セリート|100|add|登録|
        ||||110|change|更新|
        ||||120|delete|削除|
        |500|Pick-up|受取方法|100|add|登録|
        ||||110|change|更新|
        ||||120|delete|削除|
        |600|Order|オーダー確定|200|check|確認|
        ||||210|add|確定
        |610|Cart|カート|100|add|登録|
        ||||120|delete|削除|
        |620|ItemGroup|商品グループ|100|add|登録|
        ||||110|change|更新|
        ||||120|delete|削除|
        |700|Payment|会計|000|calling|呼出|
        ||||030|absence|不在|
        ||||031|reset|reset|
        |800|Start processing|加工開始|-|-|-|
        |850|Finish processing|加工終了|-|-|-|
        |900|Deliver|受け渡し|-|-|-|
        |951|Adjustment|調整|000|calling|呼出|
        ||||030|absence|不在|
        ||||031|reset|reset|
        |952|General help|General help|000|calling|呼出|
        ||||030|absence|不在|
        ||||031|reset|reset|
        <br>
