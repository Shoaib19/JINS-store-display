        awaitingDeliveryLensPickupTime: "11:00:00"
      required:
        - timeRequiredUntilCall
        - availableLines
        - openingHourAvailableLines
        - receptionCloseTime
        - processingCloseTime
        - inStockLensPickupTime
        - awaitingDeliveryLensPickupTime
