components:
  parameters:
    Authorization:
      in: header
      name: Authorization
      required: true
      description:
        "POST us/v1/jins/oauth/token で取得したOAuthのBearerトークン。<br>許可された値:
        Bearer {access_token}"
      schema:
        type: string
    Content-Type:
      in: header
      name: Content-Type
      required: true
      description: リソース・コンテンツのアプリケーション・メディアタイプ。<br>許可された値:application/json
      schema:
        type: string
        example: "application"
    Accept:
      in: header
      name: Accept
      required: true
      description: リソース・コンテンツのアプリケーション・メディアタイプ。<br>許可された値:application/json
      schema:
        type: string
        example: "application"
    X-API-KEY:
      in: header
      name: X-API-KEY
      required: true
      description: 各アプリ・システムに対して環境ごとに払い出されたAPI認証キー
      schema:
        type: string
    Accept-Language:
      in: header
      name: Accept-Language
      required: false
      description: 言語指定<br>デフォルト値:en<br>許可された値:en
      schema:
        type: string
        example: "en"
    X-Cursor:
      in: header
      name: X-Cursor
      required: false
      description: 取得開始位置<br>レスポンスヘッダで返却された X-Cursor の値を指定
      schema:
        type: string
    JinsTraceID:
      in: header
      name: Jins-Trace-ID
      description: アプリケーションノード間のトレーサビリティを確保するためのID
      required: true
      example: 2389c607-f5ed-4789-95a3-efd78be1e8d9
      schema:
        type: string
        format: uuid
        nullable: false
    StaffID:
      name: staffID
      description: UI側でユーザを識別できるIDを格納
      in: header
      required: true
      example: "00028"
      schema:
        type: string
        maxLength: 8
    JinsStoreTimezone:
      in: header
      name: Jins-Store-Timezone
      description: 店舗のタイムゾーン
      example: "America/Los_Angeles"
      schema:
        type: string
    callingStatusCode:
      name: callingStatusCode
      description: |
        呼び出し状態コード
        |コード|名称(日本語)|名称(英語)|
        |:---|:---|:---|
        |001|呼出待|waiting|
        |002|呼出中|calling|
        |003|呼出済|in service|
        |090|不在|no show|
      in: path
      required: true
      schema:
        type: string
        example: "003"
        maxLength: 3

  examples:
    COM_0000:
      summary: Internal Server Error
      description: |
        Internal Server Error
      value:
        Jins-Trace-ID: "2389c607-f5ed-4789-95a3-efd78be1e8d9"
        timestamp: "2024-12-30T12:34:56Z"
        systemName: "BFF"
        code: "COM_0000"
        message: "Internal Server Error."
        details: "Unexpected error occurred."
    COM_0001:
      summary: バリデーションエラー
      description: |
        必須項目が指定されていない / 型が正しくない / 文字数制約 etc...
      value:
        Jins-Trace-ID:  "b76d2300-cc59-11ea-a9ea-00059a3c7a00"
        timestamp: "2024-12-30T12:34:56Z"
        systemName: "BFF"
        code: "COM_0001"
        message: "Validation error occurred."
        details: "{\"status\":400,\"errors\":[{\"path\":\"itemCategoryCode\",\"errorCode\":\"maxLength.openapi.requestValidation\",\"location\":\"body\"}]}"
    COM_0002:
      summary: 対象データなし
      description: |
        対象データなし
      value:
        Jins-Trace-ID:  "b76d2300-cc59-11ea-a9ea-00059a3c7a00"
        timestamp: "2024-12-30T12:34:56Z"
        systemName: "BFF"
        code: "COM_0002"
        message: "Specified data not found"
        details: "There is no recode matched 250123US999999."
    BFF_USSTORESTAFF_0007:
      summary: 店舗/住所が未入力
      description: |
        受取店舗/住所が未入力
      value:
        Jins-Trace-ID:  "b76d2300-cc59-11ea-a9ea-00059a3c7a00"
        timestamp: "2024-12-30T12:34:56Z"
        systemName: "BFF"
        code: "BFF_USSTORESTAFF_0007"
        message: "At least store or address is required."
        details: "{\"status\":400,\"errors\":[\"At least store or address is required.\"]}"
    # BFF_USSTORESTAFF_0024:
    #   summary: パラメータ組み合わせエラー
    #   description: |
    #     リクエスト.商品グループコードが指定されていて、リクエスト.受付番号が指定されていない
    #   value:
    #     Jins-Trace-ID:  "b76d2300-cc59-11ea-a9ea-00059a3c7a00"
    #     timestamp: "2024-12-30T12:34:56Z"
    #     systemName: "BFF"
    #     code: "COM_0001"
    #     message: "When requesting a item group code, the reception number is also required."
    BFF_USSTORESTAFF_0025:
      summary: 受付日の検索範囲指定NG
      description: |
        受付日の検索始めと検索終わりどちらかしか値がない
      value:
        Jins-Trace-ID:  "b76d2300-cc59-11ea-a9ea-00059a3c7a00"
        timestamp: "2024-12-30T12:34:56Z"
        systemName: "BFF"
        code: "COM_0001"
        message: "Validation error occurred."
