        |11|キャンセル|加工ミス|Processing error|
        |12|キャンセル|お客様都合キャンセル|Customer request|
        |13|キャンセル|その他|Others|
        |21|返品|不良返品|Defective item|
        |22|返品|お客様都合返品|Customer request|
        |23|返品|保証返品|Return policy|
        |24|返品|その他|Others|
        <br>
