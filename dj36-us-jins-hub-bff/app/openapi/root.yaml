    itemCategoryCode:
      type: string
      description: |
        商品種別コード
        |コード|名称|
        |:---|:---|
        |01|フレーム|
        |02|レンズ(左)|
        |03|レンズ(右)|
        |04|ケース|
        |05|セリート|
        |11|度数情報|
        |12|レンズOP|
        |13|処方箋画像|
        |14|レンズ交換|
        |21|備考|
        |91|チェックアウト|

        ※レンズ(左), レンズ(右), レンズ交換は内部処理で利用想定のため、
          リクエストで受け取る想定はない(2025/3/12現在)
        <br>
      maxLength: 2
    perspectiveTypeCode:
      type: string
      description: |
        遠中近区分
        |コード|名称(日本語)|名称(英語)|焦点分類|
        |:---|:---|:---|:---|
        |000|度なし|Non-prescription|単焦点|
        |001|遠用|Distance|単焦点|
        |002|近用|Near|単焦点|
        |003|遠近|Progressive|遠近|
        |004|中近|Mid-Near|中近|
        |005|近近|Near-Near|近近|
        |007|サポート|Support|サポート|
        |008|Bi-Focal|Bi-Focal|Bi-Focal|
        |100|老眼|Readers|単焦点|
        |101|中間用|Intermediate|単焦点|
