      type: string
      description: |
        交換種別
        |コード|名称(英語)|
        |:---|:---|
        |001|Warranty|
        |002|Return Policy|
        <br>
      maxLength: 3
      nullable: true
    replacementPart:
      type: string
      description: |
        交換部位
        |コード|名称(英語)|名称(英語)|
        |:---|:---|:---|
        |000|ALL| JINS-Hubで利用|
        |001|Frame| JINS-Hubで利用|
        |002|Lens Both| JINS-Hubで利用(=Lenses)|
