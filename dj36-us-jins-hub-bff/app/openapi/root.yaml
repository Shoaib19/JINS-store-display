openapi: 3.0.3
info:
  title: Sales API
  description: |-
    ### 受付保証カートFrontAPI一覧 (L2-1)
    ### 共通仕様
    #### リクエストヘッダー
    TBD
    #### レスポンスヘッダー
    TBD
    #### エラーレスポンス
    TBD
    ##### エラーコード
    * 400: Bad Request
    * 401: Unauthorized
    * 403: Forbidden
    * 404: Not Found
    * 405: Method Not Allowed
    * 406: Not Acceptable
    * 409: Conflict
    * 429: Too Many Requests
    * 500: Internal Server Error
    * 501: Not Implemented
    * 503: Service Unavailable
    * 504: Gateway Timeout
  version: 1.0.0
tags:
  - name: Reception
    description: 受付
  - name: Process
    description: 工程管理
  - name: Store
    description: 店舗
  - name: CallManagement
    description: 呼出し管理
  - name: Order
    description: オーダー
  - name: Sales
    description: 販売(カート)
  - name: ItemGroups
    description: 販売(商品グループ)
  - name: Prescription
    description: 処方箋
  - name: Item
    description: カタログ
  - name: Delivery
    description: 配送
  - name: Staff
    description: スタッフ
  - name: Warranty
    description: 保証交換
paths:
  /api/status:
    get:
      tags:
        - system
      summary: health check
      operationId: status
      responses:
        "200":
          description: success
          content:
            application/json:
              schema:
                type: string
              example: healthy
        "400":
          description: failure
          content:
            application/json:
              schema:
                type: string
              example: unhealthy

  /api/sales/receptions/{storeCode}:
    get:
      tags:
        - Reception
      summary: 待ち状況取得API
      description: 来店目的ごとに待ち時間・待ち人数を取得する
      operationId: getReceptions
      parameters:
        - $ref: "#/components/parameters/JinsTraceID"
        - $ref: "#/components/parameters/JinsStoreTimezone"
        - name: storeCode
          description: 店舗コード
          in: path
          required: true
          schema:
            type: string
            example: "83005"
            maxLength: 5
        - name: encryptionReceptionNumber
          description: 暗号化された受付番号
          in: query
          schema:
            type: string
            example: "504c9f67bb9d1b472477fa0aa944d402"
        - name: encryptionItemGroupCode
          description: 暗号化された商品グループコード
          in: query
          schema:
            type: string
            example: "21d08ff121b5a90769f726875859f198f0f18d02c4705eafd8ab70ccd6d3d28e"
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RcptInfoGetResponse"
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              examples:
                COM_0001:
                  $ref: "#/components/examples/COM_0001"
                COM_0002:
                  $ref: "#/components/examples/COM_0002"
        429:
          $ref: "#/components/responses/TooManyRequests"
        500:
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Reception
      summary: 受付番号発番API
      description: 受付情報テーブルに登録する
      operationId: postReceptionInfo
      parameters:
        - $ref: "#/components/parameters/JinsTraceID"
        - $ref: "#/components/parameters/JinsStoreTimezone"
        - name: storeCode
          description: 店舗コード
          in: path
          required: true
          schema:
            type: string
            example: "83005"
            maxLength: 5
      requestBody:
        required: true
        description: 受付情報テーブル登録APIリクエストボディ
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RcptInfoPostRequest"
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RcptInfoPostResponse"
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              examples:
                COM_0001:
                  $ref: "#/components/examples/COM_0001"
                COM_0002:
                  $ref: "#/components/examples/COM_0002"
                BFF_USSTORESTAFF_0033:
                  $ref: "#/components/examples/BFF_USSTORESTAFF_0033"
                DPFM_CATALOG_0003:
                  $ref: "#/components/examples/DPFM_CATALOG_0003"
                DPFM_RCPT_0004:
                  $ref: "#/components/examples/DPFM_RCPT_0004"
                DPFM_RCPT_0005:
                  $ref: "#/components/examples/DPFM_RCPT_0005"
                DPFM_RCPT_0007:
                  $ref: "#/components/examples/DPFM_RCPT_0007"
                DPFM_RCPT_0008:
                  $ref: "#/components/examples/DPFM_RCPT_0008"
                DPFM_RCPT_0009:
                  $ref: "#/components/examples/DPFM_RCPT_0009"
                DPFM_RCPT_0010:
                  $ref: "#/components/examples/DPFM_RCPT_0010"
        429:
          $ref: "#/components/responses/TooManyRequests"
        500:
          $ref: "#/components/responses/InternalServerError"

  /api/sales/receptions/{storeCode}/{encryptionReceptionNumber}:
    put:
      tags:
        - Reception
      summary: 受付キャンセルAPI
      description: 顧客からの受付をキャンセルする
      operationId: putReceptionCancel
      parameters:
        - $ref: "#/components/parameters/JinsTraceID"
        - $ref: "#/components/parameters/JinsStoreTimezone"
        - name: storeCode
          description: 店舗コード
          in: path
          required: true
          schema:
            type: string
            example: "83005"
            maxLength: 5
        - name: encryptionReceptionNumber
          description: 暗号化された受付番号
          in: path
          required: true
          schema:
            type: string
            example: "504c9f67bb9d1b472477fa0aa944d402"
      responses:
        200:
          description: OK
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              examples:
                COM_0001:
                  $ref: "#/components/examples/COM_0001"
                COM_0002:
                  $ref: "#/components/examples/COM_0002"
        409:
          $ref: '#/components/responses/Conflict'
        429:
          $ref: "#/components/responses/TooManyRequests"
        500:
          $ref: "#/components/responses/InternalServerError"

  /api/sales/reception-events/{receptionNumber}/{itemGroupCode}:
    get:
      tags:
        - Reception
      summary: 受付履歴取得API
      description: 受付処理登録テーブルから操作日時とスタッフIDとスタッフ名を取得する
      operationId: getReceptionEvent
      parameters:
        - $ref: "#/components/parameters/JinsTraceID"
        - $ref: "#/components/parameters/JinsStoreTimezone"
        - name: receptionNumber
          description: 受付番号
          in: path
          required: true
          schema:
            type: string
            example: "240123US000001"
            maxLength: 14
        - name: itemGroupCode
          description: 商品グループコード
          in: path
          required: true
          schema:
            type: string
            example: "240123US000001-1"
            maxLength: 17
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RcptEventGetResponse"
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              examples:
                COM_0001:
                  $ref: "#/components/examples/COM_0001"
                COM_0002:
                  $ref: "#/components/examples/COM_0002"
        # 404:
        #   $ref: "#/components/responses/NotFound"
        429:
          $ref: "#/components/responses/TooManyRequests"
        500:
          $ref: "#/components/responses/InternalServerError"

  /api/sales/reception-tickets/{storeCode}/{receptionNumber}:
    get:
      tags:
        - Reception
      summary: 受付票・番号票API
      description: 指定された店舗／受付番号に該当する受付票、及び番号票の情報を取得する
      operationId: getReceptionTickets
      parameters:
        - $ref: "#/components/parameters/JinsTraceID"
        - $ref: "#/components/parameters/JinsStoreTimezone"
        - name: storeCode
          description: 店舗コード
          in: path
          required: true
          schema:
            type: string
            example: "83005"
            maxLength: 5
        - name: receptionNumber
          description: 受付番号
          in: path
          required: true
          schema:
            type: string
            example: "240123US000001"
            maxLength: 14
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RcptTicketsGetResponse"
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              examples:
                COM_0001:
                  $ref: "#/components/examples/COM_0001"
                COM_0002:
                  $ref: "#/components/examples/COM_0002"
                DPFM_RCPT_0010:
                  $ref: "#/components/examples/DPFM_RCPT_0010"
        429:
          $ref: "#/components/responses/TooManyRequests"
        500:
          $ref: "#/components/responses/InternalServerError"
  /api/sales/receptions-search/{storeCode}:
    get:
      tags:
        - Reception
      summary: 受付情報検索API
      description: 指定された店舗の受付情報を検索する
      operationId: getReceptionSearch
      parameters:
        - $ref: "#/components/parameters/JinsTraceID"
        - $ref: "#/components/parameters/X-Cursor"
        - $ref: "#/components/parameters/JinsStoreTimezone"
        - name: storeCode
          description: 店舗コード
          in: path
          required: true
          schema:
            type: string
            example: "83005"
            maxLength: 5
        - name: keyword
          description: 検索キーワード
          in: query
          required: false
          schema:
            type: string
            example: "241230US000001"
        - name: receptionStatusCode
          description: 受付ステータスコード
          in: query
          required: false
          schema:
            type: string
            example: "100,101"
        - name: fromReceptionDate
          description: 受付日（検索始め）※toReceptionDateがある場合のみ必須
          in: query
          required: false
          schema:
            type: string
            example: "2024-12-29T16:00:00Z"
        - name: toReceptionDate
          description: 受付日（検索終わり）※fromReceptionDateがある場合のみ必須
          in: query
          required: false
          schema:
            type: string
            example: "2024-12-31T15:59:59Z"
        - name: countryCodeAlpha2
          description: 国コード
          in: query
          required: false
          schema:
            type: string
            example: "US"
        - name: sortKey
          description: |
            並び替えキー
            昇順降順はコロン区切り
            複数の場合はカンマ区切り
            スペースは挟まない
          in: query
          required: false
          schema:
            type: string
            example: "fromReceptionDate:ASC"
      responses:
        200:
          description: OK
          headers:
            X-Cursor:
              $ref: "#/components/parameters/X-Cursor"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RcptSearchGetResponse"
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              examples:
                COM_0001:
                  $ref: "#/components/examples/COM_0001"
                COM_0002:
                  $ref: "#/components/examples/COM_0002"
                BFF_USSTORESTAFF_0025:
                  $ref: "#/components/examples/BFF_USSTORESTAFF_0025"
        429:
          $ref: "#/components/responses/TooManyRequests"
        500:
          $ref: "#/components/responses/InternalServerError"
  /api/sales/processes/{storeCode}:
    get:
      tags:
        - Process
      summary: 工程情報一覧取得API
      description: 店舗コードに紐づく工程管理情報を一覧で取得する
      operationId: getProcessesList
      parameters:
        - $ref: "#/components/parameters/JinsTraceID"
        - $ref: "#/components/parameters/JinsStoreTimezone"
        - name: storeCode
          description: 店舗コード
          in: path
          required: true
          schema:
            type: string
            example: "83005"
            maxLength: 5
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RcptProcessListGetResponse"
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              examples:
                COM_0001:
                  $ref: "#/components/examples/COM_0001"
                COM_0002:
                  $ref: "#/components/examples/COM_0002"
                DPFM_RCPT_0002:
                  $ref: "#/components/examples/DPFM_RCPT_0002"
                DPFM_RCPT_0010:
                  $ref: "#/components/examples/DPFM_RCPT_0010"
        429:
          $ref: "#/components/responses/TooManyRequests"
        500:
          $ref: "#/components/responses/InternalServerError"

  /api/sales/reception-events-customer/{storeCode}/{receptionNumber}:
    get:
      tags:
        - Process
      summary: 顧客情報・受付履歴取得API
      description: 顧客情報、受付履歴を取得する
      operationId: getReceptionEventCustomer
      parameters:
        - $ref: "#/components/parameters/JinsTraceID"
        - $ref: "#/components/parameters/JinsStoreTimezone"
        - name: storeCode
          description: 店舗コード
          in: path
          required: true
          schema:
            type: string
            example: "83005"
            maxLength: 5
        - name: receptionNumber
          description: 受付番号
          in: path
          required: true
          schema:
            type: string
            example: "240123US000001"
            maxLength: 14
        - name: itemGroupCode
          description: 商品グループコード
          in: query
          required: false
          schema:
            type: string
            example: "240123US000001-1"
            maxLength: 17
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RcptEventCstmrGetResponse"
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              examples:
                COM_0001:
                  $ref: "#/components/examples/COM_0001"
                COM_0002:
                  $ref: "#/components/examples/COM_0002"
        404:
          $ref: "#/components/responses/NotFound"
        429:
          $ref: "#/components/responses/TooManyRequests"
        500:
          $ref: "#/components/responses/InternalServerError"

  /api/sales/reception-events/calling-status/{storeCode}/{receptionNumber}/{callingStatusCode}:
    put:
      tags:
        - Process
      summary: 呼出ステータス更新API
      description: 呼出ステータスコードを更新する
      operationId: putCallingStatus
      parameters:
        - $ref: "#/components/parameters/JinsTraceID"
        - $ref: "#/components/parameters/StaffID"
        - $ref: "#/components/parameters/JinsStoreTimezone"
        - name: storeCode
          description: 店舗コード
          in: path
          required: true
          schema:
            type: string
            example: "83005"
            maxLength: 5
        - name: receptionNumber
          description: 受付番号
          in: path
          required: true
          schema:
            type: string
            example: "240123US000001"
            maxLength: 14
        - $ref: "#/components/parameters/callingStatusCode"
      responses:
        200:
          $ref: "#/components/responses/CallingStatusOK"
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              examples:
                COM_0001:
                  $ref: "#/components/examples/COM_0001"
                COM_0002:
                  $ref: "#/components/examples/COM_0002"
                BFF_USSTORESTAFF_0032:
                  $ref: "#/components/examples/BFF_USSTORESTAFF_0032"
        404:
          $ref: "#/components/responses/NotFound"
        409:
          $ref: '#/components/responses/Conflict'
        429:
          $ref: "#/components/responses/TooManyRequests"
        500:
          $ref: "#/components/responses/InternalServerError"

  /api/sales/stores/{storeCode}:
    get:
      tags:
        - Store
      summary: 店舗情報取得API
      description: 店舗情報を取得する
      operationId: getStoreByCode
      parameters:
        - $ref: "#/components/parameters/JinsTraceID"
        - $ref: "#/components/parameters/JinsStoreTimezone"
        - name: storeCode
          description: 店舗コード
          in: path
          required: true
          schema:
            type: string
            example: "83005"
            maxLength: 5
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreInfoResponse"
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              examples:
                COM_0001:
                  $ref: "#/components/examples/COM_0001"
                COM_0002:
                  $ref: "#/components/examples/COM_0002"
        429:
          $ref: "#/components/responses/TooManyRequests"
        500:
          $ref: "#/components/responses/InternalServerError"

  /api/sales/call-management/{storeCode}:
    get:
      tags:
        - CallManagement
      summary: 呼出し管理情報取得API
      description: 店舗ごとの呼出し管理情報を取得する
      operationId: getCallManagement
      parameters:
        - $ref: "#/components/parameters/JinsTraceID"
        - $ref: "#/components/parameters/JinsStoreTimezone"
        - name: storeCode
          description: 店舗コード
          in: path
          required: true
          schema:
            type: string
            example: "83005"
            maxLength: 5
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallManagementInfoResponse"
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              examples:
                COM_0001:
                  $ref: "#/components/examples/COM_0001"
                COM_0002:
                  $ref: "#/components/examples/COM_0002"
        429:
          $ref: "#/components/responses/TooManyRequests"
        500:
          $ref: "#/components/responses/InternalServerError"

    put:
      tags:
        - CallManagement
      summary: 呼出し管理情報登録API
      description: 店舗ごとの呼出し管理情報を登録する
      operationId: putCallManagement
      parameters:
        - $ref: "#/components/parameters/JinsTraceID"
        - $ref: "#/components/parameters/StaffID"
        - $ref: "#/components/parameters/JinsStoreTimezone"
        - name: storeCode
          description: 店舗コード
          in: path
          required: true
          schema:
            type: string
            example: "83005"
            maxLength: 5
      requestBody:
        required: true
        description: 呼出し管理情報登録APIリクエストボディ
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallManagementPutRequest"
      responses:
        200:
          description: OK
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              examples:
                COM_0001:
                  $ref: "#/components/examples/COM_0001"
                COM_0002:
                  $ref: "#/components/examples/COM_0002"
        409:
          $ref: '#/components/responses/Conflict'
        429:
          $ref: "#/components/responses/TooManyRequests"
        500:
          $ref: "#/components/responses/InternalServerError"

  /api/sales/orders:
    get:
      tags:
        - Order
      summary: オーダー情報取得API
      description: オーダー情報を取得
      operationId: getOrder
      parameters:
        - $ref: "#/components/parameters/JinsTraceID"
        - $ref: "#/components/parameters/StaffID"
        - $ref: "#/components/parameters/JinsStoreTimezone"
        - name: receptionNumber
          description: 受付番号(受付番号orカートIDが必須)
          in: query
          required: false
          schema:
            type: string
            example: "240123US000001"
            maxLength: 14
        - name: cartId
          description: カートID(受付番号orカートIDが必須)
          in: query
          required: false
          schema:
            type: integer
            example: 123
        - name: itemGroupCode
          description: 商品グループコード
          in: query
          required: false
          schema:
            type: string
            example: "241201US000001-1"
            maxLength: 17
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              examples:
                COM_0001:
                  $ref: "#/components/examples/COM_0001"
                COM_0002:
                  $ref: "#/components/examples/COM_0002"
                DPFM_RCPT_0008:
                  $ref: "#/components/examples/DPFM_RCPT_0008"
                DPFM_RCPT_0009:
                  $ref: "#/components/examples/DPFM_RCPT_0009"
                DPFM_RCPT_0010:
                  $ref: "#/components/examples/DPFM_RCPT_0010"
        429:
          $ref: "#/components/responses/TooManyRequests"
        500:
          $ref: "#/components/responses/InternalServerError"
  /api/sales/orders/{receptionNumber}:
    post:
      tags:
        - Order
      summary: オーダー確定API
      description: カートの情報をオーダーとして複製する・在庫を割り当てる
      operationId: postOrder
      parameters:
        - $ref: "#/components/parameters/JinsTraceID"
        - $ref: "#/components/parameters/StaffID"
        - $ref: "#/components/parameters/JinsStoreTimezone"
        - name: receptionNumber
          description: 受付番号
          in: path
          required: true
          schema:
            type: string
            example: "240123US000001"
            maxLength: 14
      requestBody:
        required: true
        description: オーダー確定APIリクエストボディ
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderPostRequest"
      responses:
        200:
          description: OK
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              examples:
                COM_0001:
                  $ref: "#/components/examples/COM_0001"
                COM_0002:
                  $ref: "#/components/examples/COM_0002"
                BFF_USSTORESTAFF_0030:
                  $ref: "#/components/examples/BFF_USSTORESTAFF_0030"
                DPFM_OMS_0201:
                  $ref: "#/components/examples/DPFM_OMS_0201"
                DPFM_OMS_0202:
                  $ref: "#/components/examples/DPFM_OMS_0202"
                DPFM_OMS_0203:
                  $ref: "#/components/examples/DPFM_OMS_0203"
                DPFM_OMS_0204:
                  $ref: "#/components/examples/DPFM_OMS_0204"
                DPFM_OMS_0205:
                  $ref: "#/components/examples/DPFM_OMS_0205"
                DPFM_OMS_0206:
                  $ref: "#/components/examples/DPFM_OMS_0206"
                DPFM_OMS_0207:
