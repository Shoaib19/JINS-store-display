                type: string
          description: Jins-User-ID ヘッダー
          in: header
          name: jins-user-id
          required: true
        - content:
            text/plain:
              schema:
                type: integer
          description: リスト返却時の最大件数を指定してください。page_sizeを指定した場合、countの指定は無視されます。
          in: query
          name: count
          required: true
        - content:
            text/plain:
              schema:
                type: integer
          description: ページネーションを適用したリスト返却時に、検索対象のページ位置を指定する。未指定の場合、1指定とみなされます。
          in: query
          name: page
        - content:
            text/plain:
              schema:
                type: integer
          description: ページネーションを適用したリスト返却時に、１ページあたりの件数を指定してください。未指定の場合、ページネーションは行わず、countで指定された件数を1度に返却します。
          in: query
          name: page_size
        - content:
            text/plain:
              schema:
                type: string
          description: リスト返却時に、ソート対象となるデータ項目を指定する。複数指定時はカンマ区切りで指定する。昇順ソートの場合はポジティブ、降順ソートの場合はネガティブの値とする。 未指定時は注文番号の昇順で返却されます。e.g.) sort=receptionNumber,-orderCode<br>以下の値のみ許容します。<br>receptionNumber 受付番号<br>orderCode 注文番号<br>orderStatus 注文ステータス<br>KAIIN_ID_WIP 会員ID<br>customerName 顧客名<br>RAITENBI_WIP 来店日<br>orderDate 注文日
          in: query
          name: sort
        - content:
            text/plain:
              schema:
                type: string
          description: 顧客名 or 顧客電話番号 or 受付番号 or 会員ID を指定してください。<br/><br/>⚠️ TODO 要確認：以下の制限をいれてよいか。<br/>２文字以上の文字列を指定してください。<br/> 顧客名は、前方一致で検索されます。<br/>電話番号は、完全一致で検索されます。<br/>受付番号は、完全一致で検索で使用されます。<br/>会員IDは、完全一致検索で使用されます。<br/><br/> 顧客名 or 顧客電話番号 or 受付番号 or 会員ID いずれかの検索条件に該当する注文がレスポンス対象となります。<br><br>WIP:形式判明後=顧客電話番号<br>WIP:形式判明後=受付番号<br>WIP:形式判明後=会員ID<br>上記条件に当てはまらなかった値は顧客名とみなします。
          in: query
          name: q.keyword
        - content:
            text/plain:
              schema:
                type: string
          description: 国コード
          in: query
          name: q.countryCodeAlpha2
          required: true
        - content:
            text/plain:
              schema:
                type: string
          description: 受付店舗コード。指定した場合、完全一致検索に使用されます。
          in: query
          name: q.receptionStoreCode
        - content:
            text/plain:
              schema:
                type: array
          description: '注文ステータスコードを配列で指定してください。<br/>複数指定した場合、いずれかのステータスに該当する注文がレスポンス対象となります。<br/>nullや空のリストを指定した場合、全てのステータスの注文が返却対象となります。<br>1: xx, 2:xx ★TODO'
          in: query
          name: q.orderStatus
        - content:
            text/plain:
              schema:
                type: string
                format: date
          description: '注文日。注文日From～Toの期間は31日以下としてください。<br/>⚠️ 要確認: 期間制限・required'
          in: query
