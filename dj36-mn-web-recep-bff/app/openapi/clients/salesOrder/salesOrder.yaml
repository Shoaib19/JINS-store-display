openapi: 3.0.1
info:
  description: SalesOrder Service
  title: SalesOrder Service Service API
  version: ${api.version}
tags:
  - description: 手数料メガネ行の操作
    name: fee-glass-lines
  - description: 返品の操作
    name: returns
  - description: Configの操作
    name: pz-configs
  - description: ジョブの操作
    name: pz-bulk-jobs
  - description: お渡しメガネ行の操作
    name: glass-line-deliveries
  - description: メガネ行の操作
    name: glass-lines
  - description: 手数料行の操作
    name: fee-lines
  - description: メガネ行商品税リストの操作
    name: tax-glass-line-items
  - description: バルクジョブ履歴情報の操作
    name: pz-bulk-job-histories
  - description: 注文の操作
    name: orders
  - description: 割引行の操作
    name: discount-lines
  - description: 受付番号で注文情報を取得する
    name: orders
  - description: イベントソースの操作
    name: pz-event-sources
  - description: ジョブタスクの操作
    name: pz-bulk-job-tasks
  - description: 注文コードで注文情報を取得する
    name: orders
  - description: 割引メガネ行商品の操作
    name: discount-glass-line-items
  - description: ジョブコマンドの操作
    name: pz-bulk-job-commands
  - description: 手数料税リストの操作
    name: tax-fee-lines
  - description: リソース共通の操作
    name: _commons
  - description: 税行の操作
    name: tax-lines
  - description: 支払いの操作
    name: payments
  - description: メガネ行商品の操作
    name: glass-line-items
  - description: 割引メガネ行商品販売用商品種別の操作
    name: discount-glass-line-item-sales-item-categories
paths:
  /sales-order/_mcommand:
    post:
      description: コマンドを複数実行します。
      operationId: multiExecuteCommand
      parameters:
        - content:
            text/plain:
              schema:
                type: string
          description: Jins-Trace-ID ヘッダー
          in: header
          name: jins-trace-id
        - content:
            text/plain:
              schema:
                type: string
          description: jins-trace-idに紐付く呼出し枝番
          in: header
          name: jins-trace-id-branch-no
        - content:
            text/plain:
              schema:
                type: string
          description: Jins-User-ID ヘッダー
          in: header
          name: jins-user-id
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiExecuteCommandRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultiExecuteCommandResponse'
          description: 成功
        '400':
          content:
            application/problem+json:
              schema:
                type: object
          description: リクエストに必須の項目が不足、または不正な値を指定している
        '500':
          content:
            application/problem+json:
              schema:
                type: object
          description: データベースの操作に失敗した
      summary: コマンドの複数実行
      tags:
        - _commons
  /sales-order/_partition:
    post:
      description: 各リソースのテーブルに対してパーティションテーブルを作成します。
      operationId: commonCreatePartition
      parameters:
        - content:
            text/plain:
              schema:
                type: string
          description: Jins-Trace-ID ヘッダー
          in: header
          name: jins-trace-id
        - content:
            text/plain:
              schema:
                type: string
          description: jins-trace-idに紐付く呼出し枝番
          in: header
          name: jins-trace-id-branch-no
        - content:
            text/plain:
              schema:
                type: string
          description: Jins-User-ID ヘッダー
          in: header
          name: jins-user-id
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommonCreatePartitionRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonCreatePartitionResponse'
          description: 成功
        '500':
          content:
            application/problem+json:
              schema:
                type: object
          description: データベースの操作に失敗した
      summary: パーティションテーブルの作成
      tags:
        - _commons
  /sales-order/_sequence/{sequenceCode}:
    post:
      description: 発番のためのシーケンスを作成します。
      operationId: commonCreateSequence
      parameters:
        - in: path
          name: sequenceCode
          required: true
          schema:
            type: string
        - in: query
          name: startValue
          required: false
          schema:
            type: integer
            format: int64
        - content:
            text/plain:
              schema:
                type: string
          description: Jins-Trace-ID ヘッダー
          in: header
          name: jins-trace-id
        - content:
            text/plain:
              schema:
                type: string
          description: jins-trace-idに紐付く呼出し枝番
          in: header
          name: jins-trace-id-branch-no
        - content:
            text/plain:
              schema:
                type: string
          description: Jins-User-ID ヘッダー
          in: header
          name: jins-user-id
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonCreateSequenceResponse'
          description: 成功
        '400':
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ValidationFailedErrorResponse'
          description: リクエストに必須の項目が不足、または不正な値を指定している
        '500':
          content:
            application/problem+json:
              schema:
                type: object
          description: データベースの操作に失敗した
      summary: シーケンスの作成
      tags:
        - _commons
  /sales-order/_sequence/{sequenceCode}/_next:
    post:
      description: シーケンス値を発番します。
      operationId: commonNextSequence
      parameters:
        - in: path
          name: sequenceCode
          required: true
          schema:
            type: string
        - content:
            text/plain:
              schema:
                type: string
          description: Jins-Trace-ID ヘッダー
          in: header
          name: jins-trace-id
        - content:
            text/plain:
              schema:
                type: string
          description: jins-trace-idに紐付く呼出し枝番
          in: header
          name: jins-trace-id-branch-no
        - content:
            text/plain:
              schema:
                type: string
          description: Jins-User-ID ヘッダー
          in: header
          name: jins-user-id
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonNextSequenceResponse'
          description: 成功
        '400':
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ValidationFailedErrorResponse'
          description: リクエストに必須の項目が不足、または不正な値を指定している
        '404':
          content:
            application/problem+json:
              schema:
                type: object
          description: 指定した識別子に対するシーケンスが見つからない
        '500':
          content:
            application/problem+json:
              schema:
                type: object
          description: データベースの操作に失敗した
      summary: シーケンス値の発番
      tags:
        - _commons
