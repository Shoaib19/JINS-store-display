components:
  parameters:
    JinsTraceID:
      name: jins-trace-id
      description: <BFFシステムコード>_\<UUID>
      in: header
      required: true
      example: bff_usgjpic_ab623ca6-b1e4-3796-a761-ca05605da64a
      schema:
        type: string
        maxLength: 64
    JinsTraceIdBranchNo:
      name: jins-trace-id-branch-no
      description: jins-trace-idに紐付く呼出し枝番
      in: header
      example: 1
      schema:
        type: string
        maxLength: 64
    UserID:
      name: jins-user-id
      description: UI側でユーザを識別できるIDを格納
      in: header
      required: true
      example: U00001
      schema:
        type: string
        maxLength: 64
    ItemCodeList:
      name: itemCodeList
      description: 商品コードリスト
      in: query
      required: false
      example: AMMF14S196C96,AMMF14S196C97
      schema:
        type: array
        items:
          type: string
          maxLength: 18
      style: form
      explode: false
    ItemCodeLikeList:
      name: itemCodeLikeList
      description: 商品コードあいまいリスト
      in: query
      required: false
      example: AMMF,BMMF
      schema:
        type: array
        items:
          type: string
          maxLength: 18
      style: form
